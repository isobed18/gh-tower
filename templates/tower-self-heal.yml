# gh-tower: self-heal — diagnostic envelopes + agent fix routing on red CI.
# Install at .github/workflows/tower-self-heal.yml
# ⚠️ Edit `workflows:` below to match YOUR CI workflow name(s).
name: tower-self-heal
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  heal:
    if: >
      vars.TOWER_ENABLED != 'false' &&
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: isobed18/gh-tower/actions/self-heal@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # fix-mention: "@codex"        # or "@claude", whoever fixes agent PRs
          # agent-branch-prefixes: "codex/,claude/,agent/,copilot/"
          # max-heal-attempts: "3"
